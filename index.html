<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almanca Aşkına</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <button id="themeToggle" style="margin-bottom: 2rem; font-size: 0.8rem; padding: 0.5rem 1rem;">Karanlık Mod / Aydınlık Mod</button>
        <h1>Almanca Aşkına</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Almanca kelime yazın...">
            <button id="searchBtn">Ara</button>
        </div>
        <div id="resultContainer" class="hidden">
            <!-- Sonuçlar buraya gelecek -->
        </div>
    </main>
    <div class="reading-box" style="margin-top: 3rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
    <h2>Okuma Pratiği (A1)</h2>
    <p style="margin-top: 1rem; line-height: 1.8;">
        Der <span class="hover-word" data-tr="Masa">Tisch</span> ist groß. 
        Das <span class="hover-word" data-tr="Kitap">Buch</span> liegt auf dem Tisch. 
        Ich brauche einen <span class="hover-word" data-tr="Sandalye">Stuhl</span>.
        <div class="game-box" style="margin-top: 3rem; border-top: 1px solid var(--border-color); padding-top: 2rem;">
    <h2>Kelime Tahmin Oyunu</h2>
    <button id="randomWordBtn" style="margin: 1rem 0;">Rastgele Kelime Getir</button>
    <p id="gameWord" style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; text-transform: capitalize;">?</p>
    
    <div class="search-box">
        <input type="text" id="guessInput" placeholder="Türkçesini tahmin et...">
        <button id="guessBtn">Kontrol Et</button>
    </div>
    <p id="gameResult" style="margin-top: 1rem; font-weight: 500;"></p>
</div>
    </p>
</div>
    <script src="script.js"></script>
</body>
</html>
